name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: install SDL3 dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxfixes-dev libxss-dev libxtst-dev libwayland-dev libegl-dev

    - name: Cache SDL3 build
      id: cache-sdl
      uses: actions/cache@v4
      with:
        path: |
          external/SDL/build
          /usr/local/lib/libSDL3*
          /usr/local/include/SDL3
        key: sdl3-${{ hashFiles('external/SDL/.git/HEAD') }}

    - name: build SDL3 from source
      if: steps.cache-sdl.outputs.cache-hit != 'true'
      run: |
        cmake -S external/SDL -B external/SDL/build
        cmake --build external/SDL/build
        sudo cmake --install external/SDL/build

    - name: build from source
      run: make
