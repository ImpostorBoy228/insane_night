name: Makefile CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync submodules
        run: git submodule sync --recursive

      - name: install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libfreetype6-dev libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxfixes-dev libxss-dev libxtst-dev libwayland-dev libegl-dev

      - name: Cache Lua 5.4.8 build
        id: cache-lua
        uses: actions/cache@v4
        with:
          path: |
            external/lua-5.4.8/src/liblua.a
            external/lua-5.4.8/src/*.o
            external/lua-5.4.8/src/lua
            external/lua-5.4.8/src/luac
          key: lua-5.4.8-${{ runner.os }}-${{ hashFiles('external/lua-5.4.8/src/**', 'external/lua-5.4.8/Makefile') }}

      - name: Download Lua 5.4.8
        run: |
          if [ ! -d external/lua-5.4.8/src ]; then
            mkdir -p external
            curl -sL https://www.lua.org/ftp/lua-5.4.8.tar.gz | tar xz -C external
          fi

      - name: Build Lua 5.4.8
        if: steps.cache-lua.outputs.cache-hit != 'true'
        run: make -C external/lua-5.4.8/src linux

      - name: Get SDL submodule commit
        id: sdl-commit
        run: echo "hash=$(git submodule status external/SDL | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cache SDL3 build directory
        id: cache-sdl
        uses: actions/cache@v4
        with:
          path: external/SDL/build
          key: sdl3-build-${{ runner.os }}-${{ steps.sdl-commit.outputs.hash }}

      - name: build SDL3 from source
        if: steps.cache-sdl.outputs.cache-hit != 'true'
        run: |
          cmake -S external/SDL -B external/SDL/build -DCMAKE_BUILD_TYPE=Release
          cmake --build external/SDL/build --config Release

      - name: install SDL3
        run: sudo cmake --install external/SDL/build

      - name: build from source
        run: |
          rm -f *.o insane_night compile_commands.json
          rm -rf gcm.cache
          rm -f main.s scripts/embed
          make insane_night
