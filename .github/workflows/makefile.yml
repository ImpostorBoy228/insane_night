name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: deps
      run: sudo apt-get update && sudo apt-get install -y wget && wget https://github.com/libsdl-org/SDL/releases/download/release-3.4.10/SDL3-3.4.10.tar.gz && tar -xzf SDL3-3.4.10.tar.gz && cd SDL3-3.4.10 && mkdir build && cd build && cmake .. && make -j$(nproc) && sudo make install
    - name: build from source
      run: make
      working-directory: insane_night
