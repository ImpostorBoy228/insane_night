name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: install SDL3 dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake build-essential libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxfixes-dev libxss-dev libwayland-dev libegl-dev

    - name: clone and install SDL3
      run: |
        git clone https://github.com/libsdl-org/SDL.git
        cd SDL
        cmake -S . -B build
        cmake --build build
        sudo cmake --install build

    - name: build from source
      run: make
