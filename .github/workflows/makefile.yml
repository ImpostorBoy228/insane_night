name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: deps
      run: sudo apt update && sudo apt install libsdl3-dev -y

    - name: build fr
      run: make
